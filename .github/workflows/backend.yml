name: Backend CI/CD

on:
  push:
    branches: [develop, main]
    paths:
      - 'backend/**'
  pull_request:
    branches: [develop, main]
    paths:
      - 'backend/**'

jobs:
  build-and-test:
    name: Build, Test y Docker Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Instalar dependencias
        working-directory: backend
        run: npm ci

      - name: Ejecutar pruebas con cobertura
        working-directory: backend
        run: npm run test:ci

      - name: Subir resultados de pruebas
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            backend/junit.xml
            backend/coverage/

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build y Push imagen a Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: backend
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/biblioteca-backend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/biblioteca-backend:latest

  deploy-dev:
    name: Deploy a Dev
    needs: build-and-test
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        working-directory: backend
        run: npm ci

      - name: Deploy Worker Dev
        working-directory: backend
        run: npx wrangler deploy --env dev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

  deploy-prod:
    name: Deploy a Producción
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar dependencias
        working-directory: backend
        run: npm ci

      - name: Deploy Worker Prod
        working-directory: backend
        run: npx wrangler deploy --env prod
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
