trigger:
  branches:
    include:
      - develop
      - main
  paths:
    include:
      - frontend/**

pool:
  vmImage: ubuntu-latest

variables:
  - group: cloudflare-secrets   # CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
  - group: docker-secrets       # DOCKER_USERNAME

stages:

  - stage: Build
    displayName: Build Frontend
    jobs:
      - job: BuildReact
        displayName: Compilar React con Vite
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'

          - script: npm ci
            workingDirectory: frontend
            displayName: Instalar dependencias

          - script: npm run build
            workingDirectory: frontend
            displayName: Build producción

          - task: PublishPipelineArtifact@1
            displayName: Publicar artefacto dist
            inputs:
              targetPath: frontend/dist
              artifact: frontend-dist

          - task: Docker@2
            displayName: Build y Push imagen Frontend
            inputs:
              containerRegistry: docker-hub-connection
              repository: $(DOCKER_USERNAME)/biblioteca-frontend
              command: buildAndPush
              Dockerfile: frontend/Dockerfile
              buildContext: frontend
              tags: |
                $(Build.BuildId)
                latest

  - stage: DeployDev
    displayName: Deploy a Dev
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
    jobs:
      - deployment: DeployPagesDev
        displayName: Deploy Cloudflare Pages Dev
        environment: Dev
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadPipelineArtifact@2
                  inputs:
                    artifact: frontend-dist
                    path: frontend/dist
                - task: NodeTool@0
                  inputs:
                    versionSpec: '20.x'
                - script: npm install -g wrangler
                - script: npx wrangler pages deploy frontend/dist --project-name=biblioteca-frontend-dev
                  env:
                    CLOUDFLARE_API_TOKEN: $(CLOUDFLARE_API_TOKEN)
                    CLOUDFLARE_ACCOUNT_ID: $(CLOUDFLARE_ACCOUNT_ID)

  - stage: DeployProd
    displayName: Deploy a Producción
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployPagesProd
        displayName: Deploy Cloudflare Pages Prod
        environment: Prod
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadPipelineArtifact@2
                  inputs:
                    artifact: frontend-dist
                    path: frontend/dist
                - task: NodeTool@0
                  inputs:
                    versionSpec: '20.x'
                - script: npm install -g wrangler
                - script: npx wrangler pages deploy frontend/dist --project-name=biblioteca-frontend-prod
                  env:
                    CLOUDFLARE_API_TOKEN: $(CLOUDFLARE_API_TOKEN)
                    CLOUDFLARE_ACCOUNT_ID: $(CLOUDFLARE_ACCOUNT_ID)
