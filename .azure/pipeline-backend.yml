trigger:
  branches:
    include:
      - develop
      - main
  paths:
    include:
      - backend/**

pool:
  vmImage: ubuntu-latest

variables:
  - group: cloudflare-secrets   # Define en ADO Library: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
  - group: sentry-secrets       # Define en ADO Library: SENTRY_DSN
  - group: docker-secrets       # Define en ADO Library: DOCKER_USERNAME

stages:

  - stage: Build
    displayName: Build, Test y Docker Push
    jobs:
      - job: BuildAndTest
        displayName: Instalar, probar y publicar imagen
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'

          - script: npm ci
            workingDirectory: backend
            displayName: Instalar dependencias

          - script: npm run test:ci
            workingDirectory: backend
            displayName: Ejecutar pruebas unitarias con cobertura

          - task: PublishTestResults@2
            displayName: Publicar resultados de pruebas
            condition: always()
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: backend/junit.xml

          - task: PublishCodeCoverageResults@2
            displayName: Publicar cobertura de código
            condition: always()
            inputs:
              codeCoverageTool: Cobertura
              summaryFileLocation: backend/coverage/cobertura-coverage.xml

          - task: Docker@2
            displayName: Build y Push a Docker Hub
            inputs:
              containerRegistry: docker-hub-connection
              repository: $(DOCKER_USERNAME)/biblioteca-backend
              command: buildAndPush
              Dockerfile: backend/Dockerfile
              buildContext: backend
              tags: |
                $(Build.BuildId)
                latest

  - stage: DeployDev
    displayName: Deploy a Dev
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
    jobs:
      - deployment: DeployBackendDev
        displayName: Deploy Worker Dev
        environment: Dev
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - task: NodeTool@0
                  inputs:
                    versionSpec: '20.x'
                - script: npm ci
                  workingDirectory: backend
                - script: npx wrangler deploy --env dev
                  workingDirectory: backend
                  env:
                    CLOUDFLARE_API_TOKEN: $(CLOUDFLARE_API_TOKEN)

  - stage: DeployProd
    displayName: Deploy a Producción
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployBackendProd
        displayName: Deploy Worker Prod
        environment: Prod
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - task: NodeTool@0
                  inputs:
                    versionSpec: '20.x'
                - script: npm ci
                  workingDirectory: backend
                - script: npx wrangler deploy --env prod
                  workingDirectory: backend
                  env:
                    CLOUDFLARE_API_TOKEN: $(CLOUDFLARE_API_TOKEN)
